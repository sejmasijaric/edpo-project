spring:
  application:
    name: engraver-integration-service
  main:
    web-application-type: none

kafka:
  bootstrap-address: ${KAFKA_BOOTSTRAP_ADDRESS:localhost:29092,localhost:29094,localhost:29096}
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap-address}}
  group-id: ${KAFKA_GROUP_ID:engraver-integration-service}
  trusted-packages: ${KAFKA_TRUSTED_PACKAGES:org.unisg.ftengrave.engraverintegrationservice}
  topic:
    auto-create: ${KAFKA_TOPIC_AUTO_CREATE:true}
    replication-factor: ${KAFKA_TOPIC_REPLICATION_FACTOR:3}
    default-partitions: ${KAFKA_TOPIC_DEFAULT_PARTITIONS:1}
    engraver-command: ${KAFKA_TOPIC_ENGRAVER_COMMAND:engraver-commands}
    engraver-event: ${KAFKA_TOPIC_ENGRAVER_EVENT:engraver-events}
    engraver: ${kafka.topic.engraver-event}

engraver:
  protocol: ${ENGRAVER_PROTOCOL:http}
  host: ${ENGRAVER_HOST:localhost}
  port: ${ENGRAVER_PORT:8081}
  run-path: ${ENGRAVER_RUN_PATH:/ov/burn}
  machine: ${ENGRAVER_MACHINE:ov_1}
