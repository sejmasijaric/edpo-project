services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  factory-simulator:
    build:
      context: ../factory-simulator
      dockerfile: Dockerfile
    depends_on:
      - mqtt-broker
    ports:
      - "8081:8081"
    environment:
      FACTORY_MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://mqtt-broker:1883}
      FACTORY_MQTT_TOPIC: FTFactory/SM_1
      FACTORY_MQTT_PUBLISH_INTERVAL: 400ms

  sorter-integration-service:
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
      - mqtt-kafka-bridge

  factory-event-streams-service:
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
      - mqtt-kafka-bridge

  mqtt-kafka-bridge:
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
      - mqtt-broker
      - factory-simulator

  vacuum-gripper-integration-service:
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
      - mqtt-kafka-bridge

  engraver-integration-service:
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
      - mqtt-kafka-bridge

  polishing-machine-integration-service:
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
      - mqtt-kafka-bridge

  workstation-transport-integration-service:
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
      - mqtt-kafka-bridge
