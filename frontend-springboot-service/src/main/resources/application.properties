spring.application.name=frontend-springboot-service
server.port=8081

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092,localhost:29094,localhost:29096}
app.kafka.topic.order-events=${APP_KAFKA_TOPIC_ORDER_EVENTS:order-events}
app.kafka.topic.order-created=${APP_KAFKA_TOPIC_ORDER_CREATED:order-created}
app.kafka.topic.machine-orchestration=${APP_KAFKA_TOPIC_MACHINE_ORCHESTRATION:machine-orchestration}
app.kafka.topic.user-task-management=${APP_KAFKA_TOPIC_USER_TASK_MANAGEMENT:user-task-management}
app.kafka.topic.latest-item-status=${APP_KAFKA_TOPIC_LATEST_ITEM_STATUS:factory.latest-status}

# Dashboard service URL (proxied through /api/dashboard)
app.dashboard.service.base-url=${APP_DASHBOARD_SERVICE_BASE_URL:http://dashboard-service:8105}

# Factory simulator URL (proxied through /api/simulator for worker quick-actions)
app.simulator.service.base-url=${APP_SIMULATOR_SERVICE_BASE_URL:http://factory-simulator:8081}

# Camunda REST URLs for the per-service workflow engines (used by /api/qc and /api/manual-task)
app.qc.service.base-url=${APP_QC_SERVICE_BASE_URL:http://qc-service:8100}
app.order-orchestrator.service.base-url=${APP_ORDER_ORCHESTRATOR_SERVICE_BASE_URL:http://order-orchestrator:8101}
app.intake.service.base-url=${APP_INTAKE_SERVICE_BASE_URL:http://intake-service:8103}
app.manufacturing.service.base-url=${APP_MANUFACTURING_SERVICE_BASE_URL:http://manufacturing-service:8104}
app.kafka.topic.replication-factor=${APP_KAFKA_TOPIC_REPLICATION_FACTOR:3}
app.kafka.topic.order-events-partitions=${APP_KAFKA_TOPIC_ORDER_EVENTS_PARTITIONS:3}
app.kafka.topic.order-created-partitions=${APP_KAFKA_TOPIC_ORDER_CREATED_PARTITIONS:3}
app.kafka.topic.latest-item-status-partitions=${APP_KAFKA_TOPIC_LATEST_ITEM_STATUS_PARTITIONS:3}

# Kafka consumer
app.kafka.consumer.group-id=${APP_KAFKA_CONSUMER_GROUP_ID:frontend-service-group}
