spring:
  application:
    name: sorter-integration-service
  main:
    web-application-type: none

kafka:
  bootstrap-address: ${KAFKA_BOOTSTRAP_ADDRESS:localhost:29092,localhost:29094,localhost:29096}
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap-address}}
  group-id: ${KAFKA_GROUP_ID:sorter-integration-service}
  trusted-packages: ${KAFKA_TRUSTED_PACKAGES:org.unisg.ftengrave.sorterintegrationservice}
  topic:
    auto-create: ${KAFKA_TOPIC_AUTO_CREATE:true}
    replication-factor: ${KAFKA_TOPIC_REPLICATION_FACTOR:3}
    default-partitions: ${KAFKA_TOPIC_DEFAULT_PARTITIONS:1}
    sorting-machine-command: ${KAFKA_TOPIC_SORTING_MACHINE_COMMAND:sorting-machine-commands}
    sorting-machine-event: ${KAFKA_TOPIC_SORTING_MACHINE_EVENT:sorting-machine-events}
    sorting-machine: ${kafka.topic.sorting-machine-event}

sorter:
  protocol: ${SORTER_PROTOCOL:http}
  host: ${SORTER_HOST:localhost}
  port: ${SORTER_PORT:8081}
  detect-color-path: /sm/detect_color
  sort-path: /sm/sort
  machine: sm_1
  start: initial
