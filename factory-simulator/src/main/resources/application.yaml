server:
  port: 8081

spring:
  application:
    name: factory-simulator

factory:
  simulation:
    movement-delay: 4s
    oven-burn-duration: 5s
  mqtt:
    enabled: ${FACTORY_MQTT_ENABLED:true}
    broker-url: ${FACTORY_MQTT_BROKER_URL:tcp://localhost:1883}
    sorter-topic: ${FACTORY_MQTT_SORTER_TOPIC:FTFactory/SM_1}
    sorter-client-id: ${FACTORY_MQTT_SORTER_CLIENT_ID:factory-simulator-sorter}
    vacuum-gripper-topic: ${FACTORY_MQTT_VGR_TOPIC:FTFactory/VGR_1}
    vacuum-gripper-client-id: ${FACTORY_MQTT_VGR_CLIENT_ID:factory-simulator-vgr}
    oven-topic: ${FACTORY_MQTT_OVEN_TOPIC:FTFactory/OV_1}
    oven-client-id: ${FACTORY_MQTT_OVEN_CLIENT_ID:factory-simulator-oven}
    publish-interval: ${FACTORY_MQTT_PUBLISH_INTERVAL:2s}
