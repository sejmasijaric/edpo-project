<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factory Simulator</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <script defer th:src="@{/js/app.js}"></script>
</head>
<body>
<main class="layout">
  <section class="factory-section">
    <div class="section-header">
      <h1>Factory Simulator</h1>
      <p>Sink positions are rendered on top of the factory layout image.</p>
    </div>

    <div class="factory-canvas" th:style="'width:' + ${factoryWidth} + 'px;height:' + ${factoryHeight} + 'px;'">
      <img class="factory-layout-image" th:src="@{/assets/FT_Factory.png}" alt="Factory layout">

      <article class="machine-indicator" data-machine-id="vgr_1">
        <header>vgr_1</header>
        <p class="machine-phase">Idle</p>
      </article>

      <article class="machine-indicator" data-machine-id="wt_1">
        <header>wt_1</header>
        <p class="machine-phase">Idle</p>
      </article>

      <article class="machine-indicator" data-machine-id="sm_1">
        <header>sm_1</header>
        <p class="machine-phase">Belt off</p>
      </article>

      <article
          class="sink"
          th:each="sink : ${sinks}"
          th:attr="data-sink-id=${sink.id()}"
          th:style="'left:' + ${sink.x()} + 'px;top:' + ${sink.y()} + 'px;'">
        <header th:text="${sink.id()}">SINK-A1</header>
        <div class="item-container">
        <div class="item" th:if="${sink.item() != null}">
          <span class="item-id" th:text="${sink.item().id()}">ITEM-1001</span>
          <span class="item-color">
            <span class="color-chip" th:style="'background:' + ${sink.item().color()}"></span>
            <span th:text="${sink.item().color()}">#ffffff</span>
          </span>
        </div>
        <div class="item item-empty" th:if="${sink.item() == null}">
          Empty
        </div>
        </div>
      </article>
    </div>
  </section>

  <aside class="controls-panel">
    <h2>Item Management</h2>
    <p>Review each item, delete it, or move it directly to another sink.</p>
    <form class="add-item-form" id="add-item-form">
      <h3>Add Item</h3>
      <label>
        <span>ID</span>
        <input id="add-item-id" name="itemId" type="text" placeholder="ITEM-2001" required>
      </label>
      <label>
        <span>Color</span>
        <select id="add-item-color" name="color" required>
          <option value="Red">Red</option>
          <option value="White">White</option>
          <option value="Blue">Blue</option>
        </select>
      </label>
      <label>
        <span>Initial sink</span>
        <select id="add-item-sink" name="sinkId" required></select>
      </label>
      <button type="submit">Add Item</button>
    </form>
    <div class="controls-status" id="controls-status">Loading current simulator state…</div>
    <div class="item-list" id="item-list" aria-live="polite"></div>
  </aside>
</main>
</body>
</html>
