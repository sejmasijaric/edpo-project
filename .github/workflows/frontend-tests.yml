name: Frontend Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend-service/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-service/package-lock.json
      - run: npm ci
      - run: npm run test:run
