name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_PROJECT_NAME: air-tag-factory
      COMPOSE_FILES: -f docker/docker-compose.yml -f docker/docker-compose.simulation.yml
      ENV_FILE: --env-file docker/.env.simulation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile', '**/build.gradle', '**/pom.xml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build images
        run: docker compose $ENV_FILE $COMPOSE_FILES build --parallel

      - name: Start stack
        run: docker compose $ENV_FILE $COMPOSE_FILES up -d

      - name: Run E2E tests
        run: bash tests/e2e/run.sh

      - name: Dump service logs on failure
        if: failure()
        run: |
          mkdir -p logs
          for svc in $(docker compose $ENV_FILE $COMPOSE_FILES ps --services); do
            docker compose $ENV_FILE $COMPOSE_FILES logs --no-color --tail=400 "$svc" > "logs/${svc}.log" 2>&1 || true
          done

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-service-logs
          path: logs/
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose $ENV_FILE $COMPOSE_FILES down -v --remove-orphans
