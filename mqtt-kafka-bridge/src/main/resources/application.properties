spring.application.name=mqtt-kafka-bridge
spring.main.web-application-type=none
mqtt.broker.url=${MQTT_BROKER_URL:tcp://mqtt-broker:1883}
mqtt.topic=${MQTT_TOPIC:FTFactory/#}
mqtt.client-id=${MQTT_CLIENT_ID:mqtt-kafka-bridge}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_ADDRESS:kafka:9092,kafka-2:9092,kafka-3:9092}}
kafka.topic.bridge-target=${KAFKA_TOPIC_BRIDGE_TARGET:${KAFKA_TOPIC_RAW_FACTORY_EVENT:factory.raw-events}}
